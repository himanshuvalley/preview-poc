version: 2.1

# Client-style flow:
# PR open  → deploy job
# PR close → GitHub calls CircleCI API → destroy job runs HERE

parameters:
  run_destroy:
    type: boolean
    default: false
  pr_number:
    type: string
    default: ""

jobs:
  deploy-preview:
    docker:
      - image: cimg/node:18.20
    steps:
      - checkout
      - run:
          name: Check AWS env vars
          command: |
            if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
              echo "ERROR: Set AWS keys in CircleCI Project Settings → Environment Variables"
              exit 1
            fi
            export AWS_DEFAULT_REGION="${AWS_DEFAULT_REGION:-ap-south-1}"
            echo "Region: $AWS_DEFAULT_REGION"
      - run:
          name: Install dependencies
          command: npm install
      - run:
          name: Deploy preview
          command: |
            export AWS_DEFAULT_REGION="${AWS_DEFAULT_REGION:-ap-south-1}"
            set -e

            STAGE=""
            echo "Branch: $CIRCLE_BRANCH"
            echo "CIRCLE_PR_NUMBER=${CIRCLE_PR_NUMBER:-}"
            echo "CIRCLE_PULL_REQUEST=${CIRCLE_PULL_REQUEST:-}"

            # 1) CircleCI PR number
            if [ -n "$CIRCLE_PR_NUMBER" ]; then
              STAGE="pr-${CIRCLE_PR_NUMBER}"
              echo "Using CIRCLE_PR_NUMBER=$CIRCLE_PR_NUMBER"
            fi

            # 2) CIRCLE_PULL_REQUEST URL
            if [ -z "$STAGE" ] && [ -n "$CIRCLE_PULL_REQUEST" ]; then
              NUM=$(echo "$CIRCLE_PULL_REQUEST" | grep -oE '[0-9]+$' || true)
              if [ -n "$NUM" ]; then
                STAGE="pr-${NUM}"
                echo "Using CIRCLE_PULL_REQUEST number=$NUM"
              fi
            fi

            # 3) GitHub API (URL-encode branch: feature/my-test → feature%2Fmy-test)
            if [ -z "$STAGE" ]; then
              ENCODED_BRANCH=$(echo "$CIRCLE_BRANCH" | sed 's|/|%2F|g')
              API_URL="https://api.github.com/repos/himanshuvalley/preview-poc/pulls?head=himanshuvalley:${ENCODED_BRANCH}&state=open"
              echo "Looking up PR: $API_URL"
              RESP=$(curl -s "$API_URL")
              NUM=$(echo "$RESP" | tr ',' '\n' | grep '"number"' | head -1 | grep -o '[0-9]*' || true)
              if [ -n "$NUM" ]; then
                STAGE="pr-${NUM}"
                echo "Using GitHub API PR number=$NUM"
              else
                # also try state=all in case timing issue
                RESP2=$(curl -s "https://api.github.com/repos/himanshuvalley/preview-poc/pulls?head=himanshuvalley:${ENCODED_BRANCH}&state=all")
                NUM=$(echo "$RESP2" | tr ',' '\n' | grep '"number"' | head -1 | grep -o '[0-9]*' || true)
                if [ -n "$NUM" ]; then
                  STAGE="pr-${NUM}"
                  echo "Using GitHub API (state=all) PR number=$NUM"
                else
                  echo "GitHub API response:"
                  echo "$RESP"
                fi
              fi
            fi

            if [ -z "$STAGE" ]; then
              echo "ERROR: No PR found for branch $CIRCLE_BRANCH"
              echo "1) GitHub pe PR create karo"
              echo "2) CircleCI Project Settings → Advanced → Only build pull requests = ON"
              echo "3) Phir Rerun / naya push karo"
              exit 1
            fi

            echo "Deploying stage: $STAGE"
            npx serverless deploy --stage "$STAGE" --verbose
            echo "Open HttpApiUrl from Stack Outputs and add /hello"

  destroy-preview:
    docker:
      - image: cimg/node:18.20
    steps:
      - checkout
      - run:
          name: Check AWS env vars
          command: |
            if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
              echo "ERROR: Set AWS keys in CircleCI Project Settings → Environment Variables"
              exit 1
            fi
            if [ -z "<< pipeline.parameters.pr_number >>" ]; then
              echo "ERROR: pr_number parameter missing"
              exit 1
            fi
      - run:
          name: Install dependencies
          command: npm install
      - run:
          name: Destroy preview on CircleCI
          command: |
            export AWS_DEFAULT_REGION="${AWS_DEFAULT_REGION:-ap-south-1}"
            STAGE="pr-<< pipeline.parameters.pr_number >>"
            echo "Destroying stage: $STAGE (running on CircleCI)"
            npx serverless remove --stage "$STAGE" --verbose

workflows:
  deploy:
    when:
      not: << pipeline.parameters.run_destroy >>
    jobs:
      - deploy-preview:
          filters:
            branches:
              ignore: main

  destroy:
    when: << pipeline.parameters.run_destroy >>
    jobs:
      - destroy-preview
