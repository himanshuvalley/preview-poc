version: 2.1

# Client-style flow:
# PR open  → deploy job
# PR close → GitHub calls CircleCI API → destroy job runs HERE

parameters:
  run_destroy:
    type: boolean
    default: false
  pr_number:
    type: string
    default: ""

jobs:
  deploy-preview:
    docker:
      - image: cimg/node:18.20
    steps:
      - checkout
      - run:
          name: Check AWS env vars
          command: |
            if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
              echo "ERROR: Set AWS keys in CircleCI Project Settings → Environment Variables"
              exit 1
            fi
            export AWS_DEFAULT_REGION="${AWS_DEFAULT_REGION:-ap-south-1}"
            echo "Region: $AWS_DEFAULT_REGION"
      - run:
          name: Install dependencies
          command: npm install
      - run:
          name: Deploy preview
          command: |
            export AWS_DEFAULT_REGION="${AWS_DEFAULT_REGION:-ap-south-1}"
            set -e

            STAGE=""

            # 1) CircleCI PR number (sometimes set)
            if [ -n "$CIRCLE_PR_NUMBER" ]; then
              STAGE="pr-${CIRCLE_PR_NUMBER}"
              echo "Using CIRCLE_PR_NUMBER=$CIRCLE_PR_NUMBER"
            fi

            # 2) CIRCLE_PULL_REQUEST URL
            if [ -z "$STAGE" ] && [ -n "$CIRCLE_PULL_REQUEST" ]; then
              NUM=$(echo "$CIRCLE_PULL_REQUEST" | grep -oE '[0-9]+$' || true)
              if [ -n "$NUM" ]; then
                STAGE="pr-${NUM}"
                echo "Using CIRCLE_PULL_REQUEST=$CIRCLE_PULL_REQUEST"
              fi
            fi

            # 3) Ask GitHub API: which open PR is this branch?
            if [ -z "$STAGE" ]; then
              echo "Looking up PR number from GitHub for branch: $CIRCLE_BRANCH"
              RESP=$(curl -s "https://api.github.com/repos/himanshuvalley/preview-poc/pulls?head=himanshuvalley:${CIRCLE_BRANCH}&state=open")
              NUM=$(echo "$RESP" | grep -o '"number": *[0-9]*' | head -1 | grep -o '[0-9]*' || true)
              if [ -n "$NUM" ]; then
                STAGE="pr-${NUM}"
                echo "Using GitHub API PR number=$NUM"
              else
                echo "GitHub API response (truncated):"
                echo "$RESP" | head -c 500
                echo
              fi
            fi

            if [ -z "$STAGE" ]; then
              echo "ERROR: No PR found for branch $CIRCLE_BRANCH"
              echo "GitHub pe pehle Pull Request create karo, phir CircleCI rerun karo."
              exit 1
            fi

            echo "Deploying stage: $STAGE"
            npx serverless deploy --stage "$STAGE" --verbose
            echo "Open HttpApiUrl from Stack Outputs and add /hello"

  destroy-preview:
    docker:
      - image: cimg/node:18.20
    steps:
      - checkout
      - run:
          name: Check AWS env vars
          command: |
            if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
              echo "ERROR: Set AWS keys in CircleCI Project Settings → Environment Variables"
              exit 1
            fi
            if [ -z "<< pipeline.parameters.pr_number >>" ]; then
              echo "ERROR: pr_number parameter missing"
              exit 1
            fi
      - run:
          name: Install dependencies
          command: npm install
      - run:
          name: Destroy preview on CircleCI
          command: |
            export AWS_DEFAULT_REGION="${AWS_DEFAULT_REGION:-ap-south-1}"
            STAGE="pr-<< pipeline.parameters.pr_number >>"
            echo "Destroying stage: $STAGE (running on CircleCI)"
            npx serverless remove --stage "$STAGE" --verbose

workflows:
  deploy:
    when:
      not: << pipeline.parameters.run_destroy >>
    jobs:
      - deploy-preview:
          filters:
            branches:
              ignore: main

  destroy:
    when: << pipeline.parameters.run_destroy >>
    jobs:
      - destroy-preview
