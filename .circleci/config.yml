version: 2.1

jobs:
  deploy-preview:
    docker:
      - image: cimg/node:18.20
    steps:
      - checkout
      - run:
          name: Check AWS env vars
          command: |
            if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
              echo "ERROR: Set AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY in CircleCI Project Settings → Environment Variables"
              exit 1
            fi
            export AWS_DEFAULT_REGION="${AWS_DEFAULT_REGION:-ap-south-1}"
            echo "Region: $AWS_DEFAULT_REGION"
      - run:
          name: Install dependencies
          command: npm install
      - run:
          name: Deploy preview
          command: |
            export AWS_DEFAULT_REGION="${AWS_DEFAULT_REGION:-ap-south-1}"

            if [ -n "$CIRCLE_PR_NUMBER" ]; then
              STAGE="pr-${CIRCLE_PR_NUMBER}"
            else
              STAGE="pr-$(echo "$CIRCLE_BRANCH" | tr '/' '-' | tr '[:upper:]' '[:lower:]' | cut -c1-20)"
            fi

            echo "Deploying stage: $STAGE"
            npx serverless deploy --stage "$STAGE" --verbose

workflows:
  preview:
    jobs:
      - deploy-preview:
          filters:
            branches:
              ignore: main
